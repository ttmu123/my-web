<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>用户登录</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" name="phone" placeholder="请输入手机号" required>
                </div>
                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="button" id="loginBtn" class="login-btn">登录</button>
                <div class="register-link">
                    <a href="#" id="showRegister">注册新用户</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>注册新用户</h3>
                <span class="close" id="closeRegister">&times;</span>
            </div>
            <div class="register-container">
                <form id="registerForm">
                    <div class="input-group">
                        <label for="regPhone">手机号</label>
                        <input type="tel" id="regPhone" name="regPhone" placeholder="请输入手机号" required>
                    </div>
                    <div class="input-group">
                        <label for="regPassword">密码</label>
                        <input type="password" id="regPassword" name="regPassword" placeholder="请输入密码（至少6位）" required>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">确认密码</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                    </div>
                    <button type="button" id="registerBtn" class="register-btn">注册</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 拖动验证弹窗 -->
    <div id="captchaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>安全验证</h3>
                <span class="close" id="closeCaptcha">&times;</span>
            </div>
            <div class="captcha-container">
                <div class="captcha-text">请按住滑块，拖动到最右边</div>
                <div class="captcha-slider">
                    <div class="slider-track"></div>
                    <div class="slider-thumb" id="sliderThumb">
                        <span>→</span>
                    </div>
                    <div class="slider-success">✓</div>
                </div>
                <div class="captcha-footer">
                </div>
            </div>
        </div>
    </div>

    <!-- 半透明提示弹窗 -->
    <div id="toast" class="toast">
        <div class="toast-content">
            <span class="toast-message" id="toastMessage"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
